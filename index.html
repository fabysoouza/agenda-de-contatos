<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Agenda de contatos</title>
</head>
<body>
    <header>
        <h1>Agenda de Contatos</h1>
    </header>
    
    <form id="form-contato">
        <input id="nome-contato" type="text" placeholder="Nome" required>
        <input id="numero-contato" type="tel" placeholder="Telefone" required>
        <button type="submit"> Adicionar +</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Contato</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ana Julia</td>
                <td>6199875234</td>
            </tr>
        </tbody>
        
    </table>

    <script src="./main.js"></script>
</body>
</html>
